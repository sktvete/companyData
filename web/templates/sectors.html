<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sectors – Equity OS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<style>
  :root{
    --bg:#0b0f19;--card:#111827;--muted:#1a2332;--fg:#cbd5e1;
    --accent:#3b82f6;--accent2:#06b6d4;--dim:#475569;
    --border:#1e2d3d;--pos:#22c55e;--neg:#ef4444;--warn:#f59e0b;
  }
  *{box-sizing:border-box}
  body{background:var(--bg);color:var(--fg);font-family:'JetBrains Mono',monospace}
  .card{background:var(--card);border:1px solid var(--border);border-radius:3px}
  .card:hover{border-color:rgba(59,130,246,.4);transition:border-color .15s}
  .badge{display:inline-block;padding:.1rem .4rem;font-size:.58rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;border-radius:2px}
  .badge-excellent{background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
  .badge-good{background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
  .badge-fair{background:rgba(245,158,11,.1);color:#fbbf24;border:1px solid rgba(245,158,11,.3)}
  .badge-poor{background:rgba(239,68,68,.1);color:#f87171;border:1px solid rgba(239,68,68,.3)}
  .badge-risky{background:rgba(168,85,247,.1);color:#c084fc;border:1px solid rgba(168,85,247,.3)}
  .score-bar{height:5px;border-radius:2px;background:var(--muted);overflow:hidden}
  .score-fill{height:100%;border-radius:2px;transition:width .35s ease}
  .sort-btn{background:transparent;color:var(--dim);border:1px solid var(--border);padding:.35rem .75rem;font-size:.68rem;font-family:'JetBrains Mono',monospace;border-radius:2px;cursor:pointer}
  .sort-btn:hover{color:var(--fg);border-color:rgba(59,130,246,.5)}
  .sort-btn.active{background:rgba(59,130,246,.15);color:var(--accent);border-color:rgba(59,130,246,.45)}
  .run-btn{background:transparent;color:var(--accent);border:1px solid rgba(59,130,246,.4);padding:.35rem .85rem;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;border-radius:2px}
  .run-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
  a.sector-link{color:var(--accent);font-size:.72rem;font-weight:700}
  a.sector-link:hover{color:var(--accent2)}
</style>
<body class="min-h-screen">

<nav class="sticky top-0 z-40 flex items-center justify-between px-6 py-3" style="background:rgba(11,15,25,.95);backdrop-filter:blur(8px);border-bottom:1px solid var(--border)">
  <div class="flex items-center gap-3">
    <svg class="w-4 h-4" fill="none" stroke="var(--accent)" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
    <span style="font-weight:700;font-size:.85rem;letter-spacing:.06em">Equity<span style="color:var(--accent)">OS</span></span>
    <a href="/" class="run-btn" style="padding:.25rem .55rem;font-size:.62rem">&larr; Dashboard</a>
  </div>
</nav>

<div class="px-6 py-6 max-w-screen-2xl mx-auto">
  <div class="flex flex-wrap items-start justify-between gap-4 mb-6">
    <div>
      <h1 style="font-size:1.35rem;font-weight:800;letter-spacing:.04em;color:var(--fg)">Sector analysis</h1>
      <p style="color:var(--dim);font-size:.72rem;margin-top:.35rem">Average scores and scale by GICS sector (snapshot data).</p>
    </div>
    <div class="card px-5 py-3 text-center min-w-[120px]">
      <div id="totalSectors" style="font-size:1.75rem;font-weight:800;color:var(--accent2)">–</div>
      <div style="font-size:.62rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em">Sectors</div>
    </div>
  </div>

  <div class="flex gap-2 flex-wrap mb-6">
    <button type="button" class="sort-btn active" data-key="average_score" onclick="setSortKey('average_score')">Avg score</button>
    <button type="button" class="sort-btn" data-key="company_count" onclick="setSortKey('company_count')">Company count</button>
    <button type="button" class="sort-btn" data-key="total_revenue_b" onclick="setSortKey('total_revenue_b')">Revenue</button>
    <button type="button" class="sort-btn" data-key="total_market_cap_b" onclick="setSortKey('total_market_cap_b')">Market cap</button>
  </div>

  <div id="sectorsGrid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
    <div class="card p-8 col-span-full text-center" style="color:var(--dim);font-size:.75rem">Loading sector data…</div>
  </div>
</div>

<script>
  let allSectors = [];
  let sortKey = 'average_score';

  function categoryBadge(cat) {
    const cls = { EXCELLENT:'badge-excellent', GOOD:'badge-good', FAIR:'badge-fair', POOR:'badge-poor', RISKY:'badge-risky' }[cat] || 'badge-poor';
    return `<span class="badge ${cls}">${cat}</span>`;
  }

  function scoreColor(score) {
    if (score >= 14) return 'var(--pos)';
    if (score >= 10) return 'var(--accent)';
    if (score >= 7)  return 'var(--warn)';
    return 'var(--neg)';
  }

  function renderSectors(data) {
    const grid = document.getElementById('sectorsGrid');
    document.getElementById('totalSectors').textContent = data.length;

    if (!data.length) {
      grid.innerHTML = '<div class="card p-8 col-span-full text-center" style="color:var(--dim)">No sector data available.</div>';
      return;
    }

    grid.innerHTML = data.map(s => {
      const fillPct = Math.min((s.average_score / 20) * 100, 100);
      const color = scoreColor(s.average_score);
      const topHtml = s.top_companies.map(c =>
        `<div class="flex items-center justify-between gap-2" style="font-size:.72rem">
          <a href="/company/${c.symbol}" class="sector-link">${c.symbol}</a>
          <div class="flex items-center gap-2">
            ${categoryBadge(c.category)}
            <span style="color:var(--fg);font-weight:600">${c.score.toFixed(1)}</span>
          </div>
        </div>`
      ).join('');

      return `
        <div class="card p-5">
          <div class="flex items-start justify-between gap-3 mb-3">
            <div>
              <h2 style="font-weight:800;font-size:1rem;color:var(--fg);line-height:1.25">${s.name}</h2>
              <div style="color:var(--dim);font-size:.68rem;margin-top:.2rem">${s.company_count} ${s.company_count === 1 ? 'company' : 'companies'}</div>
            </div>
            <div class="text-right">
              <div style="font-size:1.5rem;font-weight:800;color:${color}">${s.average_score.toFixed(1)}</div>
              <div style="font-size:.58rem;color:var(--dim);text-transform:uppercase">avg / 20</div>
            </div>
          </div>
          <div class="score-bar mb-4"><div class="score-fill" style="width:${fillPct}%;background:${color}"></div></div>
          <div class="grid grid-cols-2 gap-2 mb-4" style="font-size:.7rem">
            <div class="text-center" style="padding:.55rem;background:var(--muted);border:1px solid var(--border);border-radius:3px">
              <div style="font-weight:700;color:var(--fg)">${s.total_revenue_fmt || fmtB(s.total_revenue_b)}</div>
              <div style="color:var(--dim);font-size:.58rem;margin-top:.15rem">Revenue</div>
            </div>
            <div class="text-center" style="padding:.55rem;background:var(--muted);border:1px solid var(--border);border-radius:3px">
              <div style="font-weight:700;color:var(--fg)">${s.total_market_cap_fmt || fmtB(s.total_market_cap_b)}</div>
              <div style="color:var(--dim);font-size:.58rem;margin-top:.15rem">Market cap</div>
            </div>
          </div>
          <div style="border-top:1px solid var(--border);padding-top:.75rem">
            <div style="font-size:.58rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.5rem">Top companies</div>
            <div class="space-y-1.5">${topHtml}</div>
          </div>
          <div style="margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--border)">
            <a href="/?sector=${encodeURIComponent(s.name)}" class="sector-link" style="display:inline-block">View all in ${s.name} →</a>
          </div>
        </div>`;
    }).join('');
  }

  function fmtB(n) {
    if (n >= 1000) return '$' + (n / 1000).toFixed(1) + 'T';
    return '$' + n.toFixed(0) + 'B';
  }

  function setSortKey(key) {
    sortKey = key;
    document.querySelectorAll('.sort-btn').forEach(b => {
      const active = b.dataset.key === key;
      b.classList.toggle('active', active);
    });
    const sorted = [...allSectors].sort((a, b) => b[key] - a[key]);
    renderSectors(sorted);
  }

  async function load() {
    try {
      const r = await fetch('/api/sectors');
      allSectors = await r.json();
      setSortKey(sortKey);
    } catch (e) {
      document.getElementById('sectorsGrid').innerHTML =
        `<div class="card p-8 col-span-full text-center" style="color:var(--neg)">Error loading data: ${e.message}</div>`;
    }
  }

  load();
</script>
</body>
</html>
