<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sectors – Equity Analysis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: '#3b82f6' } } }
    };
  </script>
  <style>
    body { background: #0f172a; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; }
    .card { background: #1e293b; border: 1px solid #334155; border-radius: .75rem; }
    .badge-excellent { background:#14532d; color:#86efac; }
    .badge-good      { background:#1e3a5f; color:#93c5fd; }
    .badge-fair      { background:#422006; color:#fbbf24; }
    .badge-poor      { background:#3b1212; color:#fca5a5; }
    .badge-risky     { background:#2d1d4e; color:#d8b4fe; }
    .score-bar { height:6px; border-radius:3px; background:#334155; }
    .score-fill { height:100%; border-radius:3px; transition:width .4s ease; }
  </style>
</head>
<body class="min-h-screen p-6">

  <!-- Header -->
  <div class="max-w-7xl mx-auto mb-8">
    <div class="flex items-center justify-between mb-4">
      <div>
        <a href="/" class="text-blue-400 hover:text-blue-300 text-sm mb-2 inline-block">← Dashboard</a>
        <h1 class="text-3xl font-bold text-white">Sector Analysis</h1>
        <p class="text-slate-400 mt-1">Investment quality ranked by sector</p>
      </div>
      <div id="totalBadge" class="card px-6 py-4 text-center">
        <div class="text-2xl font-bold text-blue-400" id="totalSectors">–</div>
        <div class="text-sm text-slate-400">Sectors</div>
      </div>
    </div>

    <!-- Sort controls -->
    <div class="flex gap-3 flex-wrap">
      <button onclick="setSortKey('average_score')" class="sort-btn px-4 py-2 rounded-lg text-sm font-medium bg-blue-600 text-white" data-key="average_score">Avg Score</button>
      <button onclick="setSortKey('company_count')" class="sort-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-slate-300" data-key="company_count">Company Count</button>
      <button onclick="setSortKey('total_revenue_b')" class="sort-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-slate-300" data-key="total_revenue_b">Revenue</button>
      <button onclick="setSortKey('total_market_cap_b')" class="sort-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-slate-300" data-key="total_market_cap_b">Market Cap</button>
    </div>
  </div>

  <!-- Sector grid -->
  <div id="sectorsGrid" class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
    <!-- Loading skeleton -->
    <div class="card p-5 animate-pulse col-span-full text-center text-slate-500 py-12">
      Loading sector data…
    </div>
  </div>

  <script>
    let allSectors = [];
    let sortKey = 'average_score';

    function categoryBadge(cat) {
      const cls = { EXCELLENT:'badge-excellent', GOOD:'badge-good', FAIR:'badge-fair', POOR:'badge-poor', RISKY:'badge-risky' }[cat] || 'badge-poor';
      return `<span class="${cls} text-xs px-2 py-0.5 rounded-full font-medium">${cat}</span>`;
    }

    function scoreColor(score) {
      if (score >= 14) return '#22c55e';
      if (score >= 10) return '#3b82f6';
      if (score >= 7)  return '#f59e0b';
      return '#ef4444';
    }

    function renderSectors(data) {
      const grid = document.getElementById('sectorsGrid');
      document.getElementById('totalSectors').textContent = data.length;

      if (!data.length) {
        grid.innerHTML = '<div class="col-span-full text-center text-slate-500 py-12">No sector data available.</div>';
        return;
      }

      grid.innerHTML = data.map(s => {
        const fillPct = Math.min((s.average_score / 20) * 100, 100);
        const color   = scoreColor(s.average_score);
        const topHtml = s.top_companies.map(c =>
          `<div class="flex items-center justify-between text-sm">
            <a href="/company/${c.symbol}" class="font-medium text-white hover:text-blue-300">${c.symbol}</a>
            <div class="flex items-center gap-2">
              ${categoryBadge(c.category)}
              <span class="text-slate-300 font-mono">${c.score.toFixed(1)}</span>
            </div>
          </div>`
        ).join('');

        return `
        <div class="card p-5 hover:border-blue-500 transition-colors">
          <div class="flex items-start justify-between mb-3">
            <div>
              <h2 class="font-bold text-white text-lg leading-tight">${s.name}</h2>
              <div class="text-slate-400 text-sm mt-0.5">${s.company_count} ${s.company_count === 1 ? 'company' : 'companies'}</div>
            </div>
            <div class="text-right">
              <div class="text-2xl font-bold" style="color:${color}">${s.average_score.toFixed(1)}</div>
              <div class="text-xs text-slate-500">avg / 20</div>
            </div>
          </div>

          <div class="score-bar mb-4">
            <div class="score-fill" style="width:${fillPct}%;background:${color}"></div>
          </div>

          <div class="grid grid-cols-2 gap-3 mb-4 text-sm">
            <div class="bg-slate-800 rounded-lg p-2 text-center">
              <div class="text-white font-medium">$${fmt(s.total_revenue_b)}B</div>
              <div class="text-slate-500 text-xs">Revenue</div>
            </div>
            <div class="bg-slate-800 rounded-lg p-2 text-center">
              <div class="text-white font-medium">$${fmt(s.total_market_cap_b)}B</div>
              <div class="text-slate-500 text-xs">Market Cap</div>
            </div>
          </div>

          <div class="border-t border-slate-700 pt-3">
            <div class="text-xs text-slate-500 mb-2 font-medium uppercase tracking-wide">Top Companies</div>
            <div class="space-y-1.5">${topHtml}</div>
          </div>

          <div class="mt-3 pt-3 border-t border-slate-700">
            <a href="/?sector=${encodeURIComponent(s.name)}"
               class="block text-center text-blue-400 hover:text-blue-300 text-sm">
              View all in ${s.name} →
            </a>
          </div>
        </div>`;
      }).join('');
    }

    function fmt(n) {
      if (n >= 1000) return (n / 1000).toFixed(1) + 'T';
      return n.toFixed(0);
    }

    function setSortKey(key) {
      sortKey = key;
      document.querySelectorAll('.sort-btn').forEach(b => {
        const active = b.dataset.key === key;
        b.className = `sort-btn px-4 py-2 rounded-lg text-sm font-medium ${active ? 'bg-blue-600 text-white' : 'bg-slate-700 text-slate-300'}`;
      });
      const sorted = [...allSectors].sort((a, b) => b[key] - a[key]);
      renderSectors(sorted);
    }

    async function load() {
      try {
        const r = await fetch('/api/sectors');
        allSectors = await r.json();
        renderSectors(allSectors);
      } catch (e) {
        document.getElementById('sectorsGrid').innerHTML =
          `<div class="col-span-full text-center text-red-400 py-12">Error loading data: ${e.message}</div>`;
      }
    }

    load();
  </script>
</body>
</html>
