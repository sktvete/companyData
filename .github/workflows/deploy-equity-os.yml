# Build equity-os image and push to ECR, then update ECS service.
# Triggers on any push to master that touches equity-os code or infrastructure.
name: Deploy equity-os

on:
  push:
    branches: [main, master]
    paths:
      - "web/**"
      - "src/**"
      - "scripts/docker-entrypoint.sh"
      - "documents/export/**"
      - "Dockerfile"
      - "deploy/aws/**"
      - ".github/workflows/deploy-equity-os.yml"
  workflow_dispatch:
    inputs:
      force_deploy:
        description: "Force deploy even if no relevant files changed"
        type: boolean
        default: false

permissions:
  id-token: write   # required for OIDC AWS authentication
  contents: read

jobs:
  deploy:
    # Skip if repo variables are not configured (e.g. forks without AWS access)
    if: vars.AWS_REGION != '' && vars.ECR_REPOSITORY != ''
    uses: moonstocksai/workflows/.github/workflows/deploy-to-aws.yml@main
    with:
      aws-region: ${{ vars.AWS_REGION }}
      ecr-repository: ${{ vars.ECR_REPOSITORY }}
      container-name: ${{ vars.CONTAINER_NAME }}
      ecs-service: ${{ vars.ECS_SERVICE }}
      ecs-cluster: ${{ vars.ECS_CLUSTER }}
      dockerfile-path: Dockerfile
      docker-context: .
    secrets:
      aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
